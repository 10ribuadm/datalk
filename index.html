<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Resmi LKSA Nurul Muttaqin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .accordion-content { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <header class="bg-blue-900 text-white py-16 px-4 text-center shadow-2xl">
        <div class="max-w-4xl mx-auto">
            <i class="fas fa-university text-5xl mb-4 text-yellow-400"></i>
            <h1 class="text-3xl md:text-5xl font-bold mb-2">LKSA Nurul Muttaqin</h1>
            <p class="text-blue-200 text-lg">Pusat Data & Administrasi Terintegrasi</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto -mt-10 px-4 pb-20">
        
        <div id="role-selector" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="glass p-8 rounded-2xl shadow-lg border border-blue-100 text-center hover:shadow-2xl transition">
                <i class="fas fa-building text-4xl text-blue-800 mb-4"></i>
                <h2 class="text-xl font-bold mb-4">Dinas Sosial</h2>
                <button onclick="auth('dinas', 'DINAS123')" class="w-full bg-blue-800 text-white py-3 rounded-lg font-semibold hover:bg-blue-900 transition">Akses Dinas</button>
            </div>
            <div class="glass p-8 rounded-2xl shadow-lg border border-green-100 text-center hover:shadow-2xl transition">
                <i class="fas fa-users text-4xl text-green-700 mb-4"></i>
                <h2 class="text-xl font-bold mb-4">Pengurus LKSA</h2>
                <button onclick="auth('pengurus', 'PENGURUS123')" class="w-full bg-green-700 text-white py-3 rounded-lg font-semibold hover:bg-green-800 transition">Akses Pengurus</button>
            </div>
        </div>

        <div id="doc-section" class="hidden space-y-4">
            <h2 id="title-role" class="text-2xl font-bold text-center text-blue-900 mb-6"></h2>
            <div id="list-container" class="space-y-4"></div>
            
            <div class="mt-12 bg-white p-8 rounded-2xl shadow-md text-center border border-dashed border-red-300">
                <h3 class="font-bold text-lg mb-2">Unduh Semua Data</h3>
                <a href="LINK_ZIP_ANDA" class="inline-block bg-red-600 text-white px-8 py-3 rounded-full font-bold hover:bg-red-700 transition">
                    <i class="fas fa-file-archive mr-2"></i> Download Paket .ZIP
                </a>
            </div>
        </div>
    </main>

    <script>
const allDocs = [
        {name: "1. Akta Notaris", url: "https://drive.google.com/file/d/1HJ3GczhRTW8_mFNYCLwHx4vgGHinhpkU/preview", roles: ['dinas']},
        {name: "2. Kemenkumham", url: "https://drive.google.com/file/d/19cJvZ1CYzqTE584CF0EjqjR6H-Z75qjc/preview", roles: ['dinas']},
        {name: "3. Ijin Operasional", url: "https://drive.google.com/file/d/1h-GvbYqv3DPgvx1oQqjTzRBIiqE75IRF/preview", roles: ['dinas', 'pengurus']},
        {name: "4. Foto Papan Struktur/Visi Misi", url: "https://drive.google.com/file/d/1Mjd0flN1lYSMLctny0Tx067M9T0NvvCR/preview", roles: ['dinas', 'pengurus']},
        {name: "5. Foto Plang Lembaga", url: "https://drive.google.com/file/d/1IvidL0--XX00xgzW-iFfyX8La4UuvsNY/preview", roles: ['dinas', 'pengurus']},
        {name: "6. Foto Bangunan Lembaga/Asrama", url: "https://drive.google.com/file/d/1w7UfeRjB64NJsq3rYj-8k3EcaCEfaQI5/preview", roles: ['dinas', 'pengurus']},
        {name: "7. Sertifikat Akreditasi", url: "https://drive.google.com/file/d/1WyPk1XC1T3Mk16M63S9ZDa8C6TmRBPrH/preview", roles: ['dinas']},
        {name: "8. Foto KTP Ketua Lembaga", url: "https://drive.google.com/file/d/1no65nHFDCFvzrT1co9Pjyp8-2l56Qr_z/preview", roles: ['dinas']},
        {name: "9. Data SDM/Pengurus", url: "https://drive.google.com/file/d/1eOImkdxa07bMw4tNPS84fO1ofNVdRjsc/preview", roles: ['dinas', 'pengurus']},
        {name: "10. Foto Kegiatan Binaan", url: "https://drive.google.com/file/d/1YIl_SyXUWp2QRut1MMwyUJ6ot7x-HH2C/preview", roles: ['dinas', 'pengurus']},
        {name: "11. Domisili Lembaga", url: "https://drive.google.com/file/d/151O57jZAm7QK14D9TIYuoUTYRs5J2wYD/preview", roles: ['dinas', 'pengurus']},
        {name: "12. BNBA/Rekap Data Binaan", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjAu0LcpainhlOfHV8x_ttBoEAE_jFL7Rfv2yOBgQomTYfSi701-V1o4QyEYSwag/pubhtml?gid=1281343130&single=true&widget=true&headers=false", roles: ['dinas']}
    ];

        function auth(role, pass) {
            Swal.fire({ title: 'Otentikasi', input: 'password', confirmButtonText: 'Masuk', showCancelButton: true })
            .then((res) => {
                if (res.value === pass) {
                    document.getElementById('role-selector').classList.add('hidden');
                    document.getElementById('doc-section').classList.remove('hidden');
                    document.getElementById('title-role').innerText = "Dashboard: " + role.toUpperCase();
                    renderDocs(role);
                } else if (res.value) { Swal.fire('Error', 'Password Salah', 'error'); }
            });
        }

        function renderDocs(role) {
            let html = "";
            allDocs.forEach((d, i) => {
                if (d.roles.includes(role)) {
                    html += `
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="p-4 cursor-pointer flex justify-between items-center bg-slate-50 hover:bg-slate-100" onclick="toggleAcc(${i})">
                                <span class="font-semibold text-blue-900">${d.name}</span>
                                <i class="fas fa-chevron-down text-slate-400"></i>
                            </div>
                            <div class="accordion-content p-4" id="acc-${i}">
                                <iframe class="w-full h-96 rounded-lg" src="${d.url}"></iframe>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('list-container').innerHTML = html;
        }

        function toggleAcc(i) {
            const el = document.getElementById('acc-' + i);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
